name: Node.js build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22', '24', '25']
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true
      - name: Cache Node.js modules
        id: yarn-cache
        uses: actions/cache@v5
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}-${{ matrix.node-version }}
      - name: Install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install
      - name: Build (dual CJS + ESM)
        run: yarn build
      - name: Run CJS integration test
        run: yarn test:integration:cjs
      - name: Run ESM integration test
        run: yarn test:integration:esm
      - name: Run examples
        run: node examples/example.js

  deno:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22', '24', '25']
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          check-latest: true
      - name: Cache Node.js modules
        id: yarn-cache
        uses: actions/cache@v5
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}-${{ matrix.node-version }}-deno
      - name: Install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install
      - name: Build (dual CJS + ESM)
        run: yarn build
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run Deno CJS integration test
        run: deno run --allow-read test/integration/deno.ts
      - name: Run Deno ESM integration test
        run: deno run --allow-read test/integration/deno-esm.ts
